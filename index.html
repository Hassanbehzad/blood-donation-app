<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blood Donation & Donor Management System</title>
<style>
  :root{
    --crimson:#A31621;
    --crimson-dark:#7A1018;
    --ink:#1C1B1F;
    --paper:#F7F4EF;
    --paper-raised:#FFFFFF;
    --line:#E4DED4;
    --slate:#5B5750;
    --amber:#B8860B;
    --ok:#2E6B4F;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  h1,h2,h3,.display{font-family:Georgia,'Times New Roman',serif;}
  .mono{font-family:'Courier New',monospace;}
  ::selection{background:var(--crimson);color:#fff;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  input:focus,select:focus{outline:2px solid var(--crimson);outline-offset:1px;}
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  .pulse-dot{animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @media (prefers-reduced-motion: reduce){.pulse-dot{animation:none;}}
  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .container{max-width:1080px;margin:0 auto;padding:28px 24px 60px;}
  header{border-bottom:1px solid var(--line);background:var(--paper-raised);padding:16px 24px;}
  .header-inner{max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:34px;height:34px;border-radius:8px;background:var(--crimson);display:flex;align-items:center;justify-content:center;color:#fff;}
  .logo-title{font-size:17px;font-weight:600;line-height:1;}
  .logo-sub{font-size:10px;letter-spacing:0.08em;color:var(--slate);text-transform:uppercase;}

  nav{display:flex;gap:4px;background:var(--paper-raised);padding:4px;border-radius:12px;border:1px solid var(--line);}
  nav button{padding:9px 16px;border-radius:9px;border:none;background:transparent;color:var(--ink);font-size:14px;font-weight:600;transition:all .15s;}
  nav button.active{background:var(--crimson);color:#fff;}

  .card{background:var(--paper-raised);border:1px solid var(--line);border-radius:14px;padding:24px;}
  .stat-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:14px;padding:20px 22px;flex:1;min-width:150px;}
  .stat-label{font-family:'Courier New',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--slate);}
  .stat-value{font-family:Georgia,serif;font-size:34px;font-weight:600;margin-top:6px;}

  .field{display:block;margin-bottom:16px;}
  .field-label{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink);}
  .input{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--line);font-size:14px;background:#fff;color:var(--ink);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .btn-primary{width:100%;padding:12px;border-radius:9px;border:none;background:var(--crimson);color:#fff;font-weight:600;font-size:14px;}
  .btn-secondary{padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:600;}

  .empty{text-align:center;padding:32px 16px;color:var(--slate);}
  .error-box{background:#FBF0EF;border:1px solid #E8B4B4;border-radius:12px;padding:20px;color:var(--crimson-dark);}

  .group-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(90px, 1fr));gap:12px;}
  .group-cell{text-align:center;padding:14px 8px;border-radius:10px;background:var(--paper);border:1px solid var(--line);}
  .group-cell.has-donors{background:#FBF0EF;}
  .group-cell .g-label{font-family:Georgia,serif;font-size:20px;font-weight:700;color:var(--slate);}
  .group-cell.has-donors .g-label{color:var(--crimson);}
  .group-cell .g-count{font-family:'Courier New',monospace;font-size:12px;color:var(--slate);margin-top:2px;}

  .donor-row{background:var(--paper-raised);border:1px solid var(--line);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
  .donor-left{display:flex;align-items:center;gap:14px;}
  .donor-badge{width:42px;height:42px;border-radius:10px;background:#FBF0EF;color:var(--crimson);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:Georgia,serif;}
  .donor-name{font-weight:600;font-size:15px;}
  .donor-meta{font-size:13px;color:var(--slate);}
  .donor-right{display:flex;align-items:center;gap:10px;}
  .status-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
  .status-dot{width:7px;height:7px;border-radius:50%;}

  .requests-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:24px;}
  @media (max-width:800px){.requests-grid{grid-template-columns:1fr;} .row2{grid-template-columns:1fr;}}
  .request-row{background:var(--paper-raised);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:10px;}
  .request-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .request-title{font-weight:600;font-size:15px;}
  .request-meta{font-size:13px;color:var(--slate);margin-top:2px;}
  .urgency-tag{font-family:'Courier New',monospace;font-size:11px;font-weight:600;text-transform:uppercase;}
  .request-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
  .status-pill{font-family:'Courier New',monospace;font-size:11px;padding:3px 9px;border-radius:20px;}

  h3.section-title{margin:0 0 18px;font-size:16px;font-weight:600;}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C12 2 5 11.5 5 15.5C5 19.6 8.13 22 12 22C15.87 22 19 19.6 19 15.5C19 11.5 12 2 12 2Z"/></svg>
      </div>
      <div>
        <div class="logo-title">Blood Donation</div>
        <div class="logo-sub">Donor Management System</div>
      </div>
    </div>
    <nav id="nav">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="donors">Donors</button>
      <button data-tab="register">Register Donor</button>
      <button data-tab="requests">Requests</button>
    </nav>
  </div>
</header>
<main class="container" id="main"></main>

<script>
const API = "http://localhost:5000/api";
const GROUPS = ["A+","A-","B+","B-","AB+","AB-","O+","O-"];
let currentTab = "dashboard";

const $main = document.getElementById("main");

document.getElementById("nav").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-tab]");
  if (!btn) return;
  document.querySelectorAll("#nav button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentTab = btn.dataset.tab;
  render();
});

function esc(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

function errorBox(msg) {
  return `<div class="error-box"><strong>Can't reach the server.</strong> ${esc(msg || "Make sure the backend is running at localhost:5000, then reload.")}</div>`;
}

function emptyState(text) {
  return `<div class="empty">
    <div style="margin-bottom:8px;opacity:.5;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2C12 2 5 11.5 5 15.5C5 19.6 8.13 22 12 22C15.87 22 19 19.6 19 15.5C19 11.5 12 2 12 2Z"/></svg>
    </div>
    <div style="font-size:14px;">${esc(text)}</div>
  </div>`;
}

// ---------- DASHBOARD ----------
async function renderDashboard() {
  $main.innerHTML = `<div class="mono" style="color:var(--slate)">Loading…</div>`;
  try {
    const res = await fetch(`${API}/stats`);
    if (!res.ok) throw new Error();
    const stats = await res.json();

    const cards = [
      {label:"Registered Donors", value: stats.totalDonors, color:"var(--ink)"},
      {label:"Available Now", value: stats.availableDonors, color:"var(--ok)"},
      {label:"Pending Requests", value: stats.pendingRequests, color:"var(--crimson)"},
      {label:"Total Donations", value: stats.totalDonations, color:"var(--amber)"},
    ].map(c => `<div class="stat-card fade-in"><div class="stat-label">${c.label}</div><div class="stat-value" style="color:${c.color}">${c.value}</div></div>`).join("");

    let groupHtml;
    if (stats.byGroup.length === 0) {
      groupHtml = emptyState("No donors registered yet. Add the first one to see the breakdown here.");
    } else {
      groupHtml = `<div class="group-grid">` + GROUPS.map(g => {
        const found = stats.byGroup.find(b => b.blood_group === g);
        const count = found ? found.count : 0;
        return `<div class="group-cell ${count ? 'has-donors' : ''}">
          <div class="g-label">${g}</div>
          <div class="g-count">${count}</div>
        </div>`;
      }).join("") + `</div>`;
    }

    $main.innerHTML = `
      <div class="fade-in">
        <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:28px;">${cards}</div>
        <div class="card">
          <h3 class="section-title">Donors by Blood Group</h3>
          ${groupHtml}
        </div>
      </div>`;
  } catch (err) {
    $main.innerHTML = errorBox();
  }
}

// ---------- REGISTER DONOR ----------
function renderRegister() {
  $main.innerHTML = `
    <div class="fade-in card" style="max-width:520px;">
      <h3 class="section-title">Register a donor</h3>
      <form id="register-form">
        <label class="field"><div class="field-label">Full name</div>
          <input class="input" name="name" required placeholder="e.g. Ahmed Raza" />
        </label>
        <div class="row2">
          <label class="field"><div class="field-label">Blood group</div>
            <select class="input" name="blood_group" required>
              <option value="">Select</option>
              ${GROUPS.map(g => `<option value="${g}">${g}</option>`).join("")}
            </select>
          </label>
          <label class="field"><div class="field-label">City</div>
            <input class="input" name="city" required placeholder="e.g. Islamabad" />
          </label>
        </div>
        <div class="row2">
          <label class="field"><div class="field-label">Phone</div>
            <input class="input" name="phone" required placeholder="03XXXXXXXXX" />
          </label>
          <label class="field"><div class="field-label">Email (optional)</div>
            <input class="input" type="email" name="email" placeholder="optional" />
          </label>
        </div>
        <label class="field"><div class="field-label">Last donation date (optional)</div>
          <input class="input" type="date" name="last_donation_date" />
        </label>
        <button type="submit" class="btn-primary">Register donor</button>
        <div id="register-status" style="margin-top:12px;font-size:13px;font-weight:600;"></div>
      </form>
    </div>`;

  const form = document.getElementById("register-form");
  const statusEl = document.getElementById("register-status");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusEl.style.color = "var(--slate)";
    statusEl.textContent = "Saving…";
    const data = Object.fromEntries(new FormData(form).entries());
    try {
      const res = await fetch(`${API}/donors`, {
        method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data)
      });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || "Failed"); }
      statusEl.style.color = "var(--ok)";
      statusEl.textContent = "Donor registered successfully.";
      form.reset();
    } catch (err) {
      statusEl.style.color = "var(--crimson)";
      statusEl.textContent = err.message;
    }
  });
}

// ---------- DONORS LIST ----------
async function renderDonors() {
  $main.innerHTML = `
    <div class="fade-in">
      <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
        <select class="input" id="filter-group" style="width:160px;">
          <option value="">All blood groups</option>
          ${GROUPS.map(g => `<option value="${g}">${g}</option>`).join("")}
        </select>
        <input class="input" id="filter-city" style="width:200px;" placeholder="Filter by city" />
      </div>
      <div id="donors-list"><div class="mono" style="color:var(--slate)">Loading…</div></div>
    </div>`;

  const groupSel = document.getElementById("filter-group");
  const citySel = document.getElementById("filter-city");
  groupSel.addEventListener("change", loadDonors);
  let cityTimer;
  citySel.addEventListener("input", () => { clearTimeout(cityTimer); cityTimer = setTimeout(loadDonors, 300); });

  async function loadDonors() {
    const listEl = document.getElementById("donors-list");
    const params = new URLSearchParams();
    if (groupSel.value) params.set("blood_group", groupSel.value);
    if (citySel.value) params.set("city", citySel.value);
    try {
      const res = await fetch(`${API}/donors?${params}`);
      if (!res.ok) throw new Error();
      const donors = await res.json();
      if (donors.length === 0) {
        listEl.innerHTML = `<div class="card">${emptyState("No donors match these filters.")}</div>`;
        return;
      }
      listEl.innerHTML = donors.map(d => `
        <div class="donor-row" data-id="${d.id}">
          <div class="donor-left">
            <div class="donor-badge">${esc(d.blood_group)}</div>
            <div>
              <div class="donor-name">${esc(d.name)}</div>
              <div class="donor-meta">${esc(d.city)} · ${esc(d.phone)}</div>
            </div>
          </div>
          <div class="donor-right">
            <span class="status-badge" style="color:${d.available ? 'var(--ok)' : 'var(--slate)'}">
              <span class="status-dot ${d.available ? 'pulse-dot' : ''}" style="background:${d.available ? 'var(--ok)' : 'var(--line)'}"></span>
              ${d.available ? "Available" : "Unavailable"}
            </span>
            <button class="btn-secondary" data-action="toggle" data-id="${d.id}" data-available="${d.available}">Toggle</button>
            <button class="btn-secondary" data-action="remove" data-id="${d.id}" style="color:var(--crimson)">Remove</button>
          </div>
        </div>
      `).join("");

      listEl.querySelectorAll("button[data-action]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          if (btn.dataset.action === "toggle") {
            const available = btn.dataset.available === "1" || btn.dataset.available === "true";
            await fetch(`${API}/donors/${id}`, {
              method:"PUT", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({available: available ? 0 : 1})
            });
          } else if (btn.dataset.action === "remove") {
            await fetch(`${API}/donors/${id}`, {method:"DELETE"});
          }
          loadDonors();
        });
      });
    } catch (err) {
      listEl.innerHTML = errorBox();
    }
  }

  loadDonors();
}

// ---------- REQUESTS ----------
async function renderRequests() {
  $main.innerHTML = `
    <div class="fade-in requests-grid">
      <div class="card" style="height:fit-content;">
        <h3 class="section-title">New blood request</h3>
        <form id="request-form">
          <label class="field"><div class="field-label">Patient name</div>
            <input class="input" name="patient_name" required />
          </label>
          <div class="row2">
            <label class="field"><div class="field-label">Blood group</div>
              <select class="input" name="blood_group" required>
                <option value="">Select</option>
                ${GROUPS.map(g => `<option value="${g}">${g}</option>`).join("")}
              </select>
            </label>
            <label class="field"><div class="field-label">Units needed</div>
              <input class="input" type="number" min="1" name="units_needed" value="1" />
            </label>
          </div>
          <label class="field"><div class="field-label">Hospital</div>
            <input class="input" name="hospital" required />
          </label>
          <div class="row2">
            <label class="field"><div class="field-label">City</div>
              <input class="input" name="city" required />
            </label>
            <label class="field"><div class="field-label">Contact phone</div>
              <input class="input" name="contact_phone" required />
            </label>
          </div>
          <label class="field"><div class="field-label">Urgency</div>
            <select class="input" name="urgency">
              <option value="low">Low</option>
              <option value="normal" selected>Normal</option>
              <option value="high">High</option>
            </select>
          </label>
          <button type="submit" class="btn-primary">Submit request</button>
          <div id="request-status" style="margin-top:10px;font-size:13px;color:var(--crimson);"></div>
        </form>
      </div>
      <div>
        <h3 class="section-title">All requests</h3>
        <div id="requests-list"><div class="mono" style="color:var(--slate)">Loading…</div></div>
      </div>
    </div>`;

  const form = document.getElementById("request-form");
  const statusEl = document.getElementById("request-status");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusEl.textContent = "";
    const data = Object.fromEntries(new FormData(form).entries());
    data.units_needed = Number(data.units_needed);
    try {
      const res = await fetch(`${API}/requests`, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data)});
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || "Failed"); }
      form.reset();
      loadRequests();
    } catch (err) {
      statusEl.textContent = err.message;
    }
  });

  const urgencyColor = { high: "var(--crimson)", normal: "var(--amber)", low: "var(--slate)" };
  const statusColor = { fulfilled: "var(--ok)", cancelled: "var(--slate)", pending: "var(--crimson)" };
  const statusBg = { fulfilled: "#EAF3EE", cancelled: "#F1F0EE", pending: "#FBF0EF" };

  async function loadRequests() {
    const listEl = document.getElementById("requests-list");
    try {
      const res = await fetch(`${API}/requests`);
      if (!res.ok) throw new Error();
      const requests = await res.json();
      if (requests.length === 0) {
        listEl.innerHTML = `<div class="card">${emptyState("No blood requests yet.")}</div>`;
        return;
      }
      listEl.innerHTML = requests.map(r => `
        <div class="request-row">
          <div class="request-top">
            <div>
              <div class="request-title">${esc(r.patient_name)} · <span style="color:var(--crimson)">${esc(r.blood_group)}</span> · ${esc(r.units_needed)} unit(s)</div>
              <div class="request-meta">${esc(r.hospital)}, ${esc(r.city)} — ${esc(r.contact_phone)}</div>
            </div>
            <span class="urgency-tag" style="color:${urgencyColor[r.urgency] || 'var(--slate)'}">${esc(r.urgency)}</span>
          </div>
          <div class="request-bottom">
            <span class="status-pill" style="background:${statusBg[r.status] || '#FBF0EF'};color:${statusColor[r.status] || 'var(--crimson)'}">${esc(r.status)}</span>
            ${r.status === "pending" ? `
              <div style="display:flex;gap:8px;">
                <button class="btn-secondary" data-action="fulfill" data-id="${r.id}">Mark fulfilled</button>
                <button class="btn-secondary" data-action="cancel" data-id="${r.id}" style="color:var(--slate)">Cancel</button>
              </div>` : ""}
          </div>
        </div>
      `).join("");

      listEl.querySelectorAll("button[data-action]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const status = btn.dataset.action === "fulfill" ? "fulfilled" : "cancelled";
          await fetch(`${API}/requests/${id}`, {method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify({status})});
          loadRequests();
        });
      });
    } catch (err) {
      listEl.innerHTML = errorBox();
    }
  }

  loadRequests();
}

function render() {
  if (currentTab === "dashboard") renderDashboard();
  else if (currentTab === "donors") renderDonors();
  else if (currentTab === "register") renderRegister();
  else if (currentTab === "requests") renderRequests();
}

render();
</script>
</body>
</html>
